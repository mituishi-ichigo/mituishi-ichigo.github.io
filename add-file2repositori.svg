<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%">
    <defs>
        <style>
            .repo-text {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                font-size: 16px;
                fill: #58a6ff;
            }

            .main-text {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                font-size: 28px;
                font-weight: 600;
                fill: #f0f6fc;
                text-anchor: middle;
            }

            .sub-text-grey {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                font-size: 16px;
                fill: #8b949e;
                text-anchor: middle;
            }

            .sub-text-blue {
                fill: #58a6ff;
            }

            .title-text {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                font-size: 20px;
                font-weight: 600;
                fill: #f0f6fc;
            }

            .input-text {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                font-size: 14px;
                fill: #8b949e;
            }

            .label-text {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                font-size: 14px;
                fill: #c9d1d9;
            }

            .sub-label {
                fill: #8b949e;
            }

            .link-text {
                fill: #58a6ff;
                text-decoration: underline;
            }

            .btn-text {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                font-size: 14px;
                font-weight: 600;
                text-anchor: middle;
            }

            .commit-text {
                fill: #ffffff;
            }

            .cancel-text {
                fill: #f85149;
            }
        </style>
    </defs>

    <rect width="1000" height="600" fill="#0d1117" />

    <text x="15" y="30" class="repo-text">mituishi-ichigo.github.io /</text>

    <rect x="15" y="50" width="970" height="230" rx="6" ry="6" fill="#0d1117" stroke="#30363d" stroke-width="1" />
    <g transform="translate(500, 110) scale(1.3)">
        <path d="M -12,-18 L 2,-18 L 12,-8 L 12,22 L -12,22 Z" fill="none" stroke="#8b949e" stroke-width="2"
            stroke-linejoin="round" />
        <path d="M 2,-18 L 2,-8 L 12,-8" fill="none" stroke="#8b949e" stroke-width="2" stroke-linejoin="round" />
    </g>
    <text x="500" y="195" class="main-text">ファイルをここにドラッグしてリポジトリに追加します</text>
    <text x="500" y="225" class="sub-text-grey">
        または <tspan class="sub-text-blue">ファイルを選択してください</tspan>
    </text>

    <g transform="translate(40, 330)">
        <circle cx="0" cy="0" r="20" fill="#ffffff" />
        <rect x="-10" y="-10" width="20" height="20" fill="#ab47bc" rx="3" />
        <rect x="-10" y="-10" width="6" height="6" fill="#ffffff" />
        <rect x="4" y="-10" width="6" height="6" fill="#ffffff" />
        <rect x="-3" y="3" width="6" height="6" fill="#ffffff" />
    </g>

    <path d="M 80,325 L 70,330 L 80,335 Z" fill="#161b22" stroke="#30363d" stroke-width="1" />
    <rect x="79" y="295" width="906" height="230" rx="6" ry="6" fill="#161b22" stroke="#30363d" stroke-width="1" />
    <rect x="80" y="320" width="5" height="20" fill="#161b22" />

    <text x="105" y="325" class="title-text">変更をコミットする</text>

    <rect x="105" y="345" width="855" height="32" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" />
    <text x="120" y="365" class="input-text">アップロードによりファイルを追加する</text>

    <rect x="105" y="387" width="855" height="75" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" />
    <text x="120" y="407" class="input-text">オプションで詳細な説明を追加できます...</text>
    <path d="M 950,452 L 955,452 M 946,456 L 955,456" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" />

    <circle cx="115" cy="485" r="6" fill="none" stroke="#58a6ff" stroke-width="2" />
    <circle cx="115" cy="485" r="2.5" fill="#58a6ff" />
    <g transform="translate(132, 479) scale(0.8)" stroke="#8b949e" stroke-width="2" fill="none">
        <circle cx="5" cy="5" r="2" fill="#8b949e" />
        <circle cx="15" cy="5" r="2" />
        <path d="M 5,7 L 5,12" />
        <path d="M 5,9 C 10,9 15,9 15,7" />
    </g>
    <text x="155" y="490" class="label-text">直接コミットする <tspan class="sub-label">主要 支店。</tspan></text>

    <circle cx="115" cy="510" r="6" fill="none" stroke="#30363d" stroke-width="2" />
    <g transform="translate(132, 504) scale(0.8)" stroke="#8b949e" stroke-width="2" fill="none">
        <circle cx="5" cy="5" r="2" />
        <circle cx="5" cy="15" r="2" />
        <circle cx="15" cy="15" r="2" />
        <path d="M 5,7 L 5,13" />
        <path d="M 15,13 L 15,10 C 15,7 5,7 5,7" />
    </g>
    <text x="155" y="515" class="label-text">
        このコミット用に新しいブランチを作成し、プルリクエストを開始してください。
        <tspan class="link-text">プルリクエストの詳細については、こちらをご覧ください。</tspan>
    </text>

    <rect x="79" y="540" width="140" height="36" rx="6" ry="6" fill="#238636" stroke="rgba(240, 246, 252, 0.1)"
        stroke-width="1" />
    <text x="149" y="562" class="btn-text commit-text">変更をコミットする</text>

    <rect x="227" y="540" width="90" height="36" rx="6" ry="6" fill="#21262d" stroke="#30363d" stroke-width="1" />
    <text x="272" y="562" class="btn-text cancel-text">キャンセル</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" width="100%">
    <defs>
        <style>
            .editor-font {
                font-family: "Consolas", "Courier New", "Segoe UI", -apple-system, "Meiryo", "Hiragino Kaku Gothic ProN", sans-serif;
            }
            .tab-text {
                font-size: 15px;
                font-weight: bold;
                fill: #f0f6fc;
                text-anchor: middle;
            }
            .top-btn-text {
                font-size: 14px;
                fill: #c9d1d9;
                font-weight: 500;
                text-anchor: middle;
            }
            .line-num {
                font-size: 15px;
                fill: #8b949e;
                text-anchor: end;
            }
            .code-text {
                font-size: 15px;
                fill: #c9d1d9;
            }
            .code-tag {
                fill: #7ee787;
                font-weight: bold;
            }
            .code-attr {
                fill: #79c0ff;
            }
            .code-string {
                fill: #a5d6ff;
            }
            .code-doctype {
                fill: #ff7b72;
                font-style: italic;
            }
        </style>
    </defs>

    <rect width="1000" height="380" fill="#0d1117" />

    <rect x="15" y="15" width="970" height="350" rx="6" ry="6" fill="#0d1117" stroke="#30363d" stroke-width="1" />

    <g transform="translate(15, 15)">
        <path d="M 0,6 A 6,6 0 0 1 6,0 L 964,0 A 6,6 0 0 1 970,6 L 970,45 L 0,45 Z" fill="#161b22" stroke="#30363d" stroke-width="1" />
        <rect x="1" y="44" width="968" height="2" fill="#0d1117" />

        <path d="M 10,45 L 10,12 A 4,4 0 0 1 14,8 L 76,8 A 4,4 0 0 1 80,12 L 80,45 Z" fill="#0d1117" stroke="#30363d" stroke-width="1" />
        <rect x="11" y="43" width="68" height="3" fill="#0d1117" />
        <text x="45" y="30" class="editor-font tab-text">コード</text>

        <text x="115" y="30" class="editor-font tab-text" fill="#8b949e">非難</text>


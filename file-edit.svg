        <text x="50" y="55" class="editor-font line-num">2</text>
        <text x="50" y="85" class="editor-font line-num">3</text>
        <text x="50" y="115" class="editor-font line-num">4</text>
        <text x="50" y="145" class="editor-font line-num">5</text>
        <text x="50" y="175" class="editor-font line-num">6</text>
        <text x="50" y="205" class="editor-font line-num">7</text>

        <text x="90" y="25" class="editor-font code-text">
            <tspan class="code-doctype">&lt;!DOCTYPE html&gt;</tspan>
        </text>

        <text x="90" y="55" class="editor-font code-text">
            &lt;<tspan class="code-tag">HTML</tspan> <tspan class="code-attr">ラン</tspan>=<tspan class="code-string">"ja "</tspan>「&gt;
        </text>

        <text x="90" y="115" class="editor-font code-text">

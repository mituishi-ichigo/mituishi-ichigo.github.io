        </text>

        <text x="90" y="205" class="editor-font code-text">
                &lt;<tspan class="code-tag">タイトル</tspan>&gt;三石一護 ホームページ作成&lt;/<tspan class="code-tag">タイトル</tspan>&gt;
        </text>

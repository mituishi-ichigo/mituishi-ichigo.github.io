            <text x="16" y="18" class="editor-font top-btn-text">生</text>

            <rect x="36" y="0" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" />
            <g transform="translate(44, 6) scale(0.85)" stroke="#c9d1d9" stroke-width="1.5" fill="none">
                <rect x="2" y="5" width="10" height="10" rx="1.5" />
                <path d="M 5,2 L 13,2 A 1.5,1.5 0 0 1 14.5,3.5 L 14.5,11" />
            </g>

            <rect x="72" y="0" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" />
            <g transform="translate(80, 6) scale(0.85)" stroke="#c9d1d9" stroke-width="1.5" fill="none">
                <path d="M 3,12 L 13,12 M 8,2 L 8,10 M 5,7 L 8,10 L 11,7" />
            </g>

            <rect x="108" y="0" width="45" height="28" rx="4" fill="#21262d" stroke="#30363d" />
            <g transform="translate(116, 6) scale(0.85)" stroke="#c9d1d9" stroke-width="1.5" fill="none">
                <path d="M 13.5,1.5 L 14.5,2.5 A 1,1 0 0 1 14.5,3.9 L 5,13.4 L 1.5,14.5 L 2.6,11 L 12.1,1.5 A 1,1 0 0 1 13.5,1.5 Z" />
            </g>
            <path d="M 143,12 L 146,15 L 149,12" stroke="#c9d1d9" stroke-width="1.5" fill="none" />

            <rect x="157" y="0" width="32" height="28" rx="4" fill="#21262d" stroke="#30363d" />
            <g transform="translate(165, 6) scale(0.85)" stroke="#c9d1d9" stroke-width="1.5" fill="none">
                <path d="M 4,4 L 1,8 L 4,12 M 12,4 L 15,8 L 12,12" />
            </g>
